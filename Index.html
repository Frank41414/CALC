<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Competition Car Dashboard</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    text-align: center;
    padding: 15px;
}

h2 {
    margin-bottom: 5px;
}

.card {
    background: #1e1e1e;
    padding: 15px;
    margin: 12px 0;
    border-radius: 12px;
}

input {
    width: 100%;
    padding: 10px;
    font-size: 18px;
    margin-top: 5px;
    border-radius: 8px;
    border: none;
    text-align: center;
}

button {
    width: 100%;
    padding: 12px;
    font-size: 18px;
    margin-top: 12px;
    border-radius: 10px;
    border: none;
    background: #00c853;
    color: white;
}

.result {
    font-size: 20px;
    margin-top: 8px;
}
.small {
    font-size: 16px;
    opacity: 0.8;
}
</style>
</head>

<body>

<h2>WHEEL CALC V3</h2>

<div class="card">
    <div>Distance (meters)</div>
    <input type="number" id="distance" step="any">
</div>

<div class="card">
    <div>Time Allowed (seconds)</div>
    <input type="number" id="time" step="any">
</div>

<button onclick="calculate()">Calculate Ideal Wheel</button>

<div class="card">
    <div class="result" id="diameterResult"></div>
    <div class="small" id="rpmResult"></div>
    <div class="small" id="speedResult"></div>
</div>

<div class="card">
    <div>Test a Wheel Diameter (inches)</div>
    <input type="number" id="testDiameter" step="any" oninput="testWheel()">
    <div class="small" id="testResult"></div>
</div>

<script>

function motorRPM(radius) {
    return 152.6 - (19.6 * radius);
}

function calculate() {

    const distanceMeters = parseFloat(document.getElementById("distance").value);
    const time = parseFloat(document.getElementById("time").value);

    if (!distanceMeters || !time) return;

    // Convert meters to inches
    const distanceInches = distanceMeters * 39.3701;

    const requiredSpeed = distanceInches / time; // inches per second

    let diameter = 3.0;

    for (let i = 0; i < 1000; i++) {

        let radius = diameter / 2;
        let rpm = motorRPM(radius);
        let speed = (rpm * Math.PI * diameter) / 60;

        let error = speed - requiredSpeed;
        diameter -= error * 0.05;
    }

    let finalRadius = diameter / 2;
    let finalRPM = motorRPM(finalRadius);
    let finalSpeed = (finalRPM * Math.PI * diameter) / 60;

    document.getElementById("diameterResult").innerHTML =
        "Ideal Wheel: <b>" + diameter.toFixed(3) + " in</b>";

    document.getElementById("rpmResult").innerHTML =
        "Predicted RPM: " + finalRPM.toFixed(1);

    document.getElementById("speedResult").innerHTML =
        "Predicted Speed: " + finalSpeed.toFixed(2) + " in/s";
}

function testWheel() {

    const diameter = parseFloat(document.getElementById("testDiameter").value);
    if (!diameter) return;

    let radius = diameter / 2;
    let rpm = motorRPM(radius);
    let speed = (rpm * Math.PI * diameter) / 60;

    document.getElementById("testResult").innerHTML =
        "RPM: " + rpm.toFixed(1) +
        " | Speed: " + speed.toFixed(2) + " in/s";
}

</script>

</body>
</html>
